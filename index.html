<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="nq — 摸黑八、芝麻分析器等静态小站" />
    <title>nq</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #14532d;
        color: #f5f5f4;
        -webkit-tap-highlight-color: transparent;
      }
      main {
        max-width: 480px;
        margin: 0 auto;
        padding: max(48px, env(safe-area-inset-top)) 20px max(32px, env(safe-area-inset-bottom));
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .subtitle {
        margin: 0 0 36px;
        font-size: 14px;
        opacity: 0.75;
        line-height: 1.5;
      }
      .cards {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .card {
        display: block;
        padding: 18px 20px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: inherit;
        text-decoration: none;
        transition: background 0.15s ease, transform 0.15s ease;
      }
      .card:hover {
        background: rgba(0, 0, 0, 0.38);
        transform: translateY(-2px);
      }
      .card:active {
        transform: scale(0.98);
      }
      .card-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .card-desc {
        font-size: 13px;
        opacity: 0.8;
        line-height: 1.55;
      }
      .card-arrow {
        float: right;
        margin-top: 2px;
        opacity: 0.5;
        font-size: 18px;
      }
      footer {
        margin-top: 40px;
        font-size: 12px;
        opacity: 0.45;
        text-align: center;
      }
      footer a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>nq</h1>
      <p class="subtitle">个人静态小站集合，纯前端、无需安装。</p>

      <nav class="cards" aria-label="应用列表">
        <a class="card" href="./ball/">
          <span class="card-arrow" aria-hidden="true">→</span>
          <div class="card-title">摸黑八</div>
          <p class="card-desc">
            14 球双人摸球游戏。对战 AI、个人竞速、实验室弃法分析。
          </p>
        </a>
        <a class="card" href="./mj/">
          <span class="card-arrow" aria-hidden="true">→</span>
          <div class="card-title">芝麻分析器</div>
          <p class="card-desc">红中麻将智能分析工具，听牌、效率与牌型练习。</p>
        </a>
      </nav>

      <footer>
        <a href="https://github.com/2621532542/nq">GitHub</a>
      </footer>
    </main>
  </body>
</html>
